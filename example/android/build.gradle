buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 26
        compileSdkVersion = 35
        targetSdkVersion = 34
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.2.21"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }

    // React Native 0.77 pins Kotlin to 2.0.21 via its bundled version catalog,
    // but doordeck-sdk 0.209.0 ships Kotlin 2.4 metadata and needs a >= 2.4
    // compiler. Force the Kotlin Gradle plugin to kotlinVersion so it can
    // consume the SDK.
    configurations.classpath {
        resolutionStrategy.eachDependency {
            if (requested.group == "org.jetbrains.kotlin") {
                useVersion(kotlinVersion)
            }
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
