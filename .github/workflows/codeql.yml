name: "CodeQL (Advanced Security)"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # Interpreted / no-build languages — scanned directly from source.
  analyze:
    name: "Analyze (${{ matrix.language }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ actions, javascript-typescript, ruby ]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: +security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # Swift is compiled and has no "none" build mode, so CodeQL must observe a real
  # build. Build the example app (the only thing that compiles ios/*.swift) under
  # CodeQL's tracer via build-mode: manual.
  analyze-swift:
    name: "Analyze (swift)"
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup
        uses: ./.github/actions/react-native-setup

      - name: Install CocoaPods
        run: |
          cd example/ios
          pod install --repo-update
        env:
          NO_FLIPPER: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual
          queries: +security-extended

      # Run the build directly (not via turbo) so it is never cache-skipped —
      # CodeQL needs the Swift compiler to actually run to extract the code.
      - name: Build iOS example (for CodeQL extraction)
        run: |
          cd example
          yarn build:ios

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"

  # Kotlin (the Android native bridge) also needs a real build — build-mode: none
  # only covers the Java half. Build the example Android app under CodeQL's tracer.
  analyze-android:
    name: "Analyze (java-kotlin)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup
        uses: ./.github/actions/react-native-setup

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
          cache: gradle

      - name: Finalize Android SDK
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Let setup-java handle dependency caching; disable the Gradle plugin's
          # own build cache so CodeQL always sees a real Kotlin/Java compilation.
          cache-disabled: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          queries: +security-extended

      # Run the build directly (not via turbo) so it is never cache-skipped —
      # CodeQL needs kotlinc/javac to actually run to extract the code.
      - name: Build Android example (for CodeQL extraction)
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        run: |
          cd example
          yarn build:android

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
